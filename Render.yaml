services:
  - type: web
    name: podsync
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: PORT
        value: "10000"
      - key: FEED_URLS
        value: "https://www.youtube.com/channel/UCO6_hwMtQZ0SLElfDMaqJGQ"
      - key: MAX_PARALLEL_DOWNLOADS
        value: "2"
    mounts:
      - type: volume
        name: podsync-data
        mountPath: /mnt/data
